post:
  tags:
    - 订阅消息
  summary: 同步用户订阅授权状态
  description: 当用户在小程序触发 wx.requestSubscribeMessage 回调后，前端应调用此接口将结果同步至后端。
  operationId: syncUserSubscription
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/SubscribeSyncRequest.yaml
  responses:
    '200':
      description: 同步成功
      content:
        application/json:
          schema:
            $ref: ../components/schemas/BaseResponse.yaml
